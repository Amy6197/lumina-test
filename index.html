<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumina</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  font-family: Arial, sans-serif;
  color: white;
  text-align: center;

  background: #05060a;
  position: relative;
}

/* 🌫️ BRUME ULTRA FIABLE */
.fog {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;

  background:
    radial-gradient(circle at 25% 30%, rgba(255, 120, 200, 0.30), transparent 55%),
    radial-gradient(circle at 70% 40%, rgba(120, 200, 255, 0.25), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(180, 120, 255, 0.20), transparent 65%);

  filter: blur(60px);
  animation: fogMove 20s ease-in-out infinite alternate;
}

@keyframes fogMove {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(3%,2%) scale(1.1); }
}

/* 🌌 étoiles */
.stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* tout ton système star reste identique */

/* 🌟 contenu */
h1, p, .card {
  position: relative;
  z-index: 2;
}

/* 🌟 TITRE */
h1 {
  font-size: 90px;
  letter-spacing: 6px;
  text-shadow: 0 0 25px #00ffd5;
  margin: 0;
}

/* 🖼️ IMAGE */
.card img {
  width: 230px;
  border-radius: 18px;
  box-shadow: 0 0 35px rgba(0,255,213,0.25);
}

/* 🔘 bouton */
.enter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  padding: 10px 18px;
  border-radius: 12px;

  text-decoration: none;
  color: white;

  border: 1px solid #00ffd5;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);

  z-index: 3;
}
</style>
</head>

<body><div class="fog"></div>
<div class="stars" id="stars"></div>

<div class="stars" id="stars"></div>

<h1>LUMINA</h1>
<p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

<div class="card">
  <img src="./feerique.jpg" alt="Lumina">
  <a class="enter" href="menu.html">Entrer</a>
</div>

<script>
const starsContainer = document.getElementById("stars");

function createStar(){
  const star = document.createElement("div");
  star.classList.add("star");

  star.style.left = Math.random()*100 + "vw";

  const size = Math.random()*2 + 1;
  star.style.width = size+"px";
  star.style.height = size+"px";

  const duration = Math.random()*6 + 4;
  star.style.animationDuration = duration+"s";

  starsContainer.appendChild(star);

  setTimeout(()=>star.remove(), duration*1000);
}

setInterval(createStar, 90);
</script>

</body>
</html>

</body>
</html>
