<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumina</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  font-family: Arial, sans-serif;
  color: white;
  text-align: center;

  background: #05060a;
}

/* 🌌 BRUME COSMIQUE 3 COUCHES */
body::before {
  content: "";
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255, 150, 220, 0.25), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(120, 200, 255, 0.22), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(180, 120, 255, 0.18), transparent 55%);
  filter: blur(50px);
  animation: fog 20s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes fog {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(4%,3%) scale(1.1); }
}

/* ✨ ÉTOILES LENTES */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 8px #00ffd5;
  animation: fall linear infinite;
  opacity: 0.8;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* 🌟 TITRE */
h1 {
  font-size: 90px;
  letter-spacing: 6px;
  text-shadow: 0 0 25px #00ffd5;
  margin: 0;
  z-index: 2;

  animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

p {
  font-size: 18px;
  opacity: 0.9;
  max-width: 600px;
  margin-bottom: 30px;
  z-index: 2;
}

/* 🖼️ IMAGE CENTRALE */
.card {
  position: relative;
  z-index: 2;
}

.card img {
  width: 230px;
  border-radius: 18px;

  box-shadow:
    0 0 30px rgba(0,255,213,0.25),
    0 0 60px rgba(255,120,220,0.15);

  animation: pulse 5s ease-in-out infinite;
  transition: 0.3s;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* 🔘 BOUTON PORTAIL */
.enter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);

  padding: 10px 18px;
  border-radius: 12px;

  text-decoration: none;
  color: white;

  border: 1px solid #00ffd5;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px);

  box-shadow: 0 0 25px rgba(0,255,213,0.4);

  transition: 0.3s;
  font-weight: bold;
}

.enter:hover {
  transform: translate(-50%,-50%) scale(1.1);
  box-shadow: 0 0 40px rgba(0,255,213,0.8);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<h1>LUMINA</h1>
<p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

<div class="card">
  <img src="./feerique.jpg" alt="Lumina">
  <a class="enter" href="menu.html">Entrer</a>
</div>

<script>
const starsContainer = document.getElementById("stars");

function createStar(){
  const star = document.createElement("div");
  star.classList.add("star");

  star.style.left = Math.random()*100 + "vw";

  const size = Math.random()*2 + 1;
  star.style.width = size+"px";
  star.style.height = size+"px";

  const duration = Math.random()*6 + 4;
  star.style.animationDuration = duration+"s";

  starsContainer.appendChild(star);

  setTimeout(()=>star.remove(), duration*1000);
}

setInterval(createStar, 90);
</script>

</body>
</html>

</body>
</html>
