<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      text-align: center;

      overflow: hidden;
    }

    /* 🌌 pluie d'étoiles */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      top: -10px;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ffd5;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }

    /* 🌌 titre */
    h1 {
      font-size: 110px;
      letter-spacing: 4px;
      margin-bottom: 20px;

      text-shadow:
        0 0 10px #00ffd5,
        0 0 20px #6a5cff;

      animation: glow 3s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 10px #00ffd5, 0 0 20px #6a5cff;
      }
      50% {
        text-shadow: 0 0 25px #00ffd5, 0 0 40px #6a5cff;
      }
    }

    p {
      font-size: 24px;
      margin-top: 10px;
      max-width: 600px;
      opacity: 0.9;
      z-index: 2;
    }

    /* 🌠 menu */
    .menu {
      margin-top: 40px;
      display: flex;
      gap: 25px;
      z-index: 2;
    }

    .menu a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 10px;
      transition: 0.3s;
      font-size: 18px;
    }

    .menu a:hover {
      background: rgba(0, 255, 213, 0.15);
      box-shadow: 0 0 12px rgba(0, 255, 213, 0.4);
    }

    /* 🌙 image */
    .image {
      margin-top: 40px;
      z-index: 2;
      position: relative;
    }

    .image img {
      width: 180px;
      border-radius: 14px;
      box-shadow:
        0 0 20px rgba(0,255,213,0.3),
        0 10px 30px rgba(0,0,0,0.5);
    }

    /* ✨ bouton entrer amélioré */
    .enter-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0,255,213,0.5);
      box-shadow: 0 0 10px rgba(0,255,213,0.4);
      transition: 0.3s;

      animation: pulse 2.5s infinite ease-in-out;
    }

    .enter-btn:hover {
      background: rgba(0, 255, 213, 0.2);
      box-shadow: 0 0 25px rgba(0,255,213,1);
      transform: translate(-50%, -50%) scale(1.1);
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 10px rgba(0,255,213,0.4);
      }
      50% {
        box-shadow: 0 0 25px rgba(0,255,213,0.9);
      }
    }

  </style>
</head>

<body>

  <!-- 🌌 étoiles -->
  <div class="stars" id="stars"></div>

  <h1>LUMINA</h1>

  <p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

  <div class="menu">
    <a href="index.html">Accueil</a>
    <a href="contenu.html">Contenu</a>
    <a href="liens.html">Liens</a>
  </div>

  <div class="image">
    <img src="./galaxie.jpg" alt="image">
    <a href="liens.html" class="enter-btn">Entrer</a>
  </div>

  <script>
    const starsContainer = document.getElementById("stars");

    function createStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";

      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      const duration = Math.random() * 5 + 3;
      star.style.animationDuration = duration + "s";

      star.style.animationDelay = Math.random() * 5 + "s";

      starsContainer.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, duration * 1000);
    }

    setInterval(createStar, 80);
  </script>

</body>
</html>
