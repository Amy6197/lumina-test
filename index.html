<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./feerique.jpg') no-repeat center center fixed;
      background-size: cover;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 110px;
      letter-spacing: 8px;

      text-shadow:
        0 0 10px #00ffd5,
        0 0 20px #00ffd5,
        0 0 40px rgba(0,255,213,0.6);

      margin-bottom: 10px;
      z-index: 2;
    }

    p {
      font-size: 20px;
      max-width: 600px;
      margin-bottom: 30px;
      z-index: 2;

      font-style: italic;
      text-shadow: 0 0 10px #00ffd5;
    }

    .card {
      position: relative;
      margin-bottom: 35px;
      z-index: 2;
    }

    .card img {
      width: 200px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,255,213,0.3);
      transition: 0.3s;
    }

    .card img:hover {
      transform: scale(1.03);
    }

    /* 🔘 bouton amélioré (SEULE modif) */
    .enter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 12px 22px;
      border-radius: 14px;

      text-decoration: none;
      color: white;
      font-weight: bold;
      letter-spacing: 1px;

      border: 1px solid rgba(0,255,213,0.7);

      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);

      box-shadow: 0 0 15px rgba(0,255,213,0.5);

      transition: all 0.3s ease;
      z-index: 3;
    }

    .enter:hover {
      transform: translate(-50%, -50%) scale(1.1);

      box-shadow:
        0 0 20px rgba(0,255,213,0.😎,
        0 0 40px rgba(0,255,213,0.4);

      background: rgba(0,0,0,0.6);
    }

    /* 🌌 étoiles (INCHANGÉ) */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      top: -10px;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ffd5;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>

  <h1>LUMINA</h1>

  <p>
    Explorer la vérité. Relier les savoirs. Démystifier le spirituel.<br>
    Pour celles et ceux qui cherchent au-delà des illusions.
  </p>

  <div class="card">
    <img src="./galaxie.jpg" alt="Lumina">
    <a class="enter" href="menu.html">Entrer</a>
  </div>

  <script>
    const starsContainer = document.getElementById("stars");

    function createStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";

      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      const duration = Math.random() * 5 + 3;
      star.style.animationDuration = duration + "s";

      starsContainer.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, duration * 1000);
    }

    setInterval(createStar, 80);
  </script>

</body>
</html>
