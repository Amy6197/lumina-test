<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./feerique.jpg') no-repeat center center fixed;
      background-size: cover;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;

      padding-top: 40px; /* équilibre visuel */
    }

    h1 {
      font-size: 90px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px #00ffd5;
      margin-top: -40px; /* remonte le titre */
      margin-bottom: 10px;
      z-index: 2;
    }

    p {
      font-size: 20px;
      opacity: 0.95;
      max-width: 600px;
      margin-bottom: 30px;
      z-index: 2;

      font-style: italic; /* italique */
      text-shadow: 0 0 10px #00ffd5; /* aura bleue */
    }

    /* 🖼️ carte centrale */
    .card {
      position: relative;
      margin-bottom: 35px;
      z-index: 2;
    }

    .card img {
      width: 200px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,255,213,0.3);
      transition: 0.3s;
    }

    .card img:hover {
      transform: scale(1.03);
    }

    /* 🔘 bouton entrer */
    .enter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 18px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      border: 1px solid #00ffd5;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px rgba(0,255,213,0.4);
      transition: 0.3s;
      font-weight: bold;
    }

    .enter:hover {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 0 25px rgba(0,255,213,0.8);
    }

    /* 🌌 étoiles */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      top: -10px;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ffd5;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- 🌌 étoiles -->
  <div class="stars" id="stars"></div>

  <h1>LUMINA</h1>

  <p>
    Explorer la vérité. Relier les savoirs. Démystifier le spirituel.<br>
    Pour celles et ceux qui cherchent au-delà des illusions.
  </p>

  <!-- 🖼️ image + bouton entrée -->
  <div class="card">
    <img src="./galaxie.jpg" alt="Lumina">
    <a class="enter" href="menu.html">Entrer</a>
  </div>

  <!-- 🌠 script étoiles -->
  <script>
    const starsContainer = document.getElementById("stars");

    function createStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";

      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      const duration = Math.random() * 5 + 3;
      star.style.animationDuration = duration + "s";

      starsContainer.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, duration * 1000);
    }

    setInterval(createStar, 80);
  </script>

</body>
</html>
