<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;

      background: #05060a;
    }

    /* 🌫️ BRUME COSMIQUE ANIMÉE */
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      z-index: 0;

      background: radial-gradient(circle at 30% 30%, rgba(255, 160, 220, 0.25), transparent 40%),
                  radial-gradient(circle at 70% 60%, rgba(120, 200, 255, 0.25), transparent 45%),
                  radial-gradient(circle at 50% 80%, rgba(180, 120, 255, 0.18), transparent 50%);

      animation: fogMove 18s ease-in-out infinite alternate;
      filter: blur(40px);
    }

    @keyframes fogMove {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(5%, 3%) scale(1.1);
      }
    }

    /* 🌠 étoiles */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      top: -10px;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ffd5;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* 🌟 TITRE */
    h1 {
      font-size: 90px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px #00ffd5;
      margin-bottom: 10px;
      z-index: 2;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
      max-width: 600px;
      margin-bottom: 30px;
      z-index: 2;
    }

    /* 🖼️ CARTE CENTRALE */
    .card {
      position: relative;
      z-index: 2;
    }

    .card img {
      width: 220px;
      border-radius: 16px;
      box-shadow: 0 0 35px rgba(0,255,213,0.25),
                  0 0 60px rgba(255, 120, 220, 0.15);
      transition: 0.3s;
    }

    .card img:hover {
      transform: scale(1.03);
    }

    /* 🔘 BOUTON */
    .enter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 10px 18px;
      border-radius: 12px;
      text-decoration: none;
      color: white;

      border: 1px solid #00ffd5;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);

      box-shadow: 0 0 20px rgba(0,255,213,0.4);
      transition: 0.3s;
      font-weight: bold;
    }

    .enter:hover {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 0 30px rgba(0,255,213,0.8);
    }
  </style>
</head>

<body>

  <!-- 🌠 étoiles -->
  <div class="stars" id="stars"></div>

  <h1>LUMINA</h1>
  <p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

  <!-- 🖼️ image centrale + bouton -->
  <div class="card">
    <img src="./feerique.jpg" alt="Lumina">
    <a class="enter" href="menu.html">Entrer</a>
  </div>

  <script>
    const starsContainer = document.getElementById("stars");

    function createStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";

      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      const duration = Math.random() * 5 + 3;
      star.style.animationDuration = duration + "s";

      starsContainer.appendChild(star);

      setTimeout(() => star.remove(), duration * 1000);
    }

    setInterval(createStar, 80);
  </script>

</body>
</html>
