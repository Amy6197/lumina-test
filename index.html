<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 90px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px #00ffd5;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
      max-width: 600px;
      margin-bottom: 40px;
    }

    .enter {
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      border: 1px solid #00ffd5;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(0,255,213,0.4);
      transition: 0.3s;
    }

    .enter:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,213,0.8);
    }
  </style>
</head>

<body>

  <h1>LUMINA</h1>

  <p>
    Revenir à soi. Se libérer. Créer une vie alignée.
  </p>

  <a class="enter" href="menu.html">Entrer</a>

</body>
</html>
