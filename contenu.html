<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contenu - Lumina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;

      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: #eaeaea;
      text-align: center;
    }

    /* 🌌 même voile que menu */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    h1 {
      margin-top: 60px;
      color: #00ffd5;
      text-shadow: 0 0 15px rgba(0,255,213,0.3);
    }

    .box {
      max-width: 700px;
      margin: 40px auto;
      padding: 25px;

      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,213,0.12);
      border-radius: 14px;

      backdrop-filter: blur(6px);
      color: rgba(235,235,235,0.9);
      line-height: 1.6;
    }

    a {
      color: #00ffd5;
      text-decoration: none;
      display: inline-block;
      margin-top: 40px;

      border: 1px solid rgba(0,255,213,0.4);
      padding: 10px 18px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
    }

  </style>
