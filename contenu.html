<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contenu - Lumina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      /* 🌌 fond galaxie */
      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: #eaeaea;
      text-align: center;
    }

    /* ✨ voile lumineux pour lisibilité */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,255,213,0.08), rgba(0,0,0,0.75));
      z-index: -1;
    }

    h1 {
      margin-top: 70px;
      font-size: 36px;
      color: #00ffd5;
      text-shadow: 0 0 18px rgba(0,255,213,0.35);
    }

    .box {
      max-width: 700px;
      margin: 40px auto;
      padding: 25px;

      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,213,0.12);
      border-radius: 16px;

      backdrop-filter: blur(6px);
      line-height: 1.7;
      font-size: 18px;
      color: rgba(235,235,235,0.9);
    }

    a {
      color: #00ffd5;
      text-decoration: none;
      display: inline-block;
      margin-top: 40px;
      font-weight: bold;

      border: 1px solid rgba(0,255,213,0.4);
      padding: 10px 18px;
      border-radius: 10px;
      background: rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    a:hover {
      background: rgba(0,255,213,0.12);
      box-shadow: 0 0 15px rgba(0,255,213,0.2);
    }

  </style>
</head>

<body>

  <h1>Contenu Lumina</h1>

  <div class="box">
    Passer de la croyance à la compréhension pour enfin savoir.
    <br><br>
    Cette page est en construction.
  </div>

  <a href="menu.html">← Retour au menu</a>

</body>
</html>
