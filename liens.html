<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liens - Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    /* 🌌 titre */
    h1 {
      font-size: 90px;
      letter-spacing: 4px;
      margin-bottom: 40px;

      text-shadow:
        0 0 10px #00ffd5,
        0 0 20px #6a5cff;

      animation: glow 3s infinite ease-in-out;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 10px #00ffd5, 0 0 20px #6a5cff;
      }
      50% {
        text-shadow: 0 0 25px #00ffd5, 0 0 40px #6a5cff;
      }
    }

    /* 🌠 menu liens */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
      font-size: 24px;

      padding: 12px 25px;
      border-radius: 12px;

      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);

      transition: 0.3s;
    }

    .menu a:hover {
      background: rgba(0, 255, 213, 0.15);
      box-shadow: 0 0 20px rgba(0,255,213,0.6);
      transform: scale(1.05);
    }

    /* 🔙 retour */
    .back {
      margin-top: 60px;
      color: white;
      text-decoration: none;
      opacity: 0.8;
      font-size: 16px;
      transition: 0.3s;
    }

    .back:hover {
      opacity: 1;
      text-shadow: 0 0 10px #00ffd5;
    }

  </style>
</head>

<body>

  <h1>LUMINA</h1>

  <div class="menu">
    <a href="#">✨ Ressource 1</a>
    <a href="#">🌌 Ressource 2</a>
    <a href="#">🧠 Ressource 3</a>
    <a href="#">🔗 Ressource 4</a>
  </div>

  <a class="back" href="index.html">← Retour à l'accueil</a>

</body>
</html>
