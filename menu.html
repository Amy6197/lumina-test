<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Menu - Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      /* Fond galaxie */
      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: white;
      text-align: center;
    }

    /* voile sombre */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    h1 {
      margin-top: 60px;
      font-size: 48px;
      text-shadow: 0 0 20px #00ffd5;
      position: relative;
      z-index: 1;
    }

    .menu {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;

      position: relative;
      z-index: 1;
    }

    .menu a {
      width: 240px;
      padding: 14px;

      border-radius: 12px;
      text-decoration: none;

      color: #00ffd5;
      font-size: 16px;
      font-weight: bold;

      border: 1px solid rgba(0,255,213,0.4);
      background: rgba(0,0,0,0.4);

      transition: 0.3s ease;
    }

    .menu a:hover {
      background: rgba(0,255,213,0.15);
      box-shadow: 0 0 18px rgba(0,255,213,0.5);
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <div class="overlay"></div>

<h1>Menu Lumina</h1>

<div class="menu">
  <a href="auteurs.html">✍️ Auteurs</a>
  <a href="contenu.html">📖 Contenu</a>

  <a href="#">🃏 Oracle / Tarot (à venir)</a>
  <a href="liens.html">🔗 Liens</a>
</div>

</body>
</html>
