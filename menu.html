<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Menu - Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      /* Fond galaxie propre */
      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: white;
      text-align: center;
    }

    /* voile sombre pour lisibilité */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    h1 {
      margin-top: 60px;
      font-size: 48px;
      text-shadow: 0 0 20px #00ffd5;
      position: relative;
      z-index: 1;
    }

    .menu {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;

      position: relative;
      z-index: 1;
    }

    .menu a {
      width: 240px;
      padding: 14px;

      border-radius: 12px;
      text-decoration: none;

      color: #00ffd5;
      font-size: 16px;
      font-weight: bold;

      border: 1px solid rgba(0,255,213,0.4);
      background: rgba(0,0,0,0.4);

      transition: 0.3s ease;
    }

    .menu a:hover {
      background: rgba(0,255,213,0.15);
      box-shadow: 0 0 18px rgba(0,255,213,0.5);
      transform: scale(1.05);
    }

    .back {
      margin-top: 50px;
      display: inline-block;

      color: white;
      opacity: 0.7;
      text-decoration: none;

      position: relative;
      z-index: 1;
    }

    .back:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

  <!-- VOILE -->
  <div class="overlay"></div>

  <h1>Menu Lumina</h1>

  <div class="menu">
    <a href="contenu.html">📖 Contenu</a>
    <a href="liens.html">🔗 Liens</a>

    <a href="#">🧠 Analyses (à venir)</a>
    <a href="#">🃏 Oracle / Tarot (à venir)</a>
  </div>

  <a class="back" href="index.html">← Retour accueil</a>

    color: #00ffd5;

    display: inline-block;
  ">
    ← Retour au menu
  </a>
</div>

</html>
