<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Lumina</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f0a1f, #1a0f2e);
            color: #e0d4ff;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 10, 40, 0.95);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #6b46c1;
        }

        nav {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #c4b5fd;
            text-decoration: none;
        }

        .nav-links a {
            color: #ddd;
            margin-left: 30px;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #a78bfa;
        }

        main {
            max-width: 700px;
            margin: 100px auto 50px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #f3e8ff;
        }

        .menu-list {
            list-style: none;
            margin: 40px 0;
        }

        .menu-list li {
            margin: 18px 0;
        }

        .menu-list a {
            color: #e0d4ff;
            text-decoration: none;
            font-size: 20px;
        }

        .menu-list a:hover {
            color: #c4b5fd;
        }

        .back {
            color: #a78bfa;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">LUMINA</a>
            <div class="nav-links">
                <a href="menu.html">Menu</a>
                <a href="contenu.html">Contenu</a>
                <a href="liens.html">Liens</a>
            </div>
        </nav>
    </header>

    <main>
        <h1>Explorer</h1>
        <p style="font-size: 20px; opacity: 0.9;">Revenir à soi. Se libérer. Créer une vie alignée.</p>

        <ul class="menu-list">
            <li><a href="contenu.html">📖 Contenu</a></li>
            <li><a href="liens.html">🔗 Liens utiles</a></li>
            <li><a href="#">✍️ Auteurs (à venir)</a></li>
            <li><a href="#">🧠 Analyses (à venir)</a></li>
            <li><a href="#">🃏 Oracle / Tarot (à venir)</a></li>
        </ul>

        <a href="index.html" class="back">← Retour à l'accueil</a>
    </main>

</body>
</html>
